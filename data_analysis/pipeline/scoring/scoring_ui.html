<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Memory Scoring Tool</title>
		<link
			href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
			rel="stylesheet" />
		<style>
			/* ── Reset & base ─────────────────────────────────────────────────────── */
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #0f1117;
				--surface: #181c27;
				--surface2: #1e2436;
				--border: #2a3045;
				--border-light: #3a4460;
				--text: #d4daf0;
				--text-dim: #6b789a;
				--text-bright: #eef2ff;

				/* mode colours */
				--rel-correct: #3b82f6; /* blue */
				--rel-incorrect: #ef4444; /* red */
				--obj-correct: #22c55e; /* green */
				--obj-incorrect: #f97316; /* orange */

				--rel-correct-bg: rgba(59, 130, 246, 0.18);
				--rel-incorrect-bg: rgba(239, 68, 68, 0.18);
				--obj-correct-bg: rgba(34, 197, 94, 0.18);
				--obj-incorrect-bg: rgba(249, 115, 22, 0.18);

				--font-mono: 'IBM Plex Mono', monospace;
				--font-sans: 'IBM Plex Sans', sans-serif;

				--radius: 6px;
				--transition: 150ms ease;
			}

			html,
			body {
				height: 100%;
				background: var(--bg);
				color: var(--text);
				font-family: var(--font-sans);
				font-size: 14px;
				line-height: 1.5;
				overflow: hidden;
			}

			/* ── Layout ───────────────────────────────────────────────────────────── */
			#app {
				display: grid;
				grid-template-rows: 48px 1fr;
				height: 100vh;
			}

			/* Header */
			#header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 20px;
				background: var(--surface);
				border-bottom: 1px solid var(--border);
				flex-shrink: 0;
			}

			#header .title {
				font-family: var(--font-mono);
				font-size: 12px;
				font-weight: 600;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--text-bright);
			}

			#progress {
				font-family: var(--font-mono);
				font-size: 11px;
				color: var(--text-dim);
			}

			#stim-label {
				font-family: var(--font-mono);
				font-size: 11px;
				color: var(--text-dim);
			}

			/* Main split */
			#main {
				display: grid;
				grid-template-columns: 1fr 1fr;
				overflow: hidden;
				gap: 0;
			}

			/* ── Left panel — image ───────────────────────────────────────────────── */
			#left-panel {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				padding: 24px;
				border-right: 1px solid var(--border);
				background: var(--bg);
				overflow: hidden;
			}

			#img-wrap {
				width: 100%;
				flex: 1;
				display: flex;
				align-items: center;
				justify-content: center;
				overflow: hidden;
			}

			#stim-img {
				max-width: 100%;
				max-height: 100%;
				object-fit: contain;
				border-radius: var(--radius);
				border: 1px solid var(--border);
				display: block;
			}

			/* ── Right panel — controls + responses ─────────────────────────────── */
			#right-panel {
				display: flex;
				flex-direction: column;
				overflow: hidden;
				background: var(--bg);
			}

			/* Mode bar */
			#mode-bar {
				display: flex;
				gap: 8px;
				padding: 12px 16px;
				background: var(--surface);
				border-bottom: 1px solid var(--border);
				flex-shrink: 0;
				align-items: center;
			}

			#mode-bar .mode-label {
				font-family: var(--font-mono);
				font-size: 10px;
				letter-spacing: 0.1em;
				color: var(--text-dim);
				text-transform: uppercase;
				margin-right: 4px;
			}

			.mode-btn {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 5px 12px;
				border-radius: var(--radius);
				border: 1.5px solid transparent;
				background: var(--surface2);
				color: var(--text-dim);
				font-family: var(--font-mono);
				font-size: 11px;
				font-weight: 500;
				cursor: pointer;
				transition: all var(--transition);
				user-select: none;
				white-space: nowrap;
			}

			.mode-btn .dot {
				width: 8px;
				height: 8px;
				border-radius: 50%;
				flex-shrink: 0;
			}

			.mode-btn[data-mode='relational_correct'] .dot {
				background: var(--rel-correct);
			}
			.mode-btn[data-mode='relational_incorrect'] .dot {
				background: var(--rel-incorrect);
			}
			.mode-btn[data-mode='object_correct'] .dot {
				background: var(--obj-correct);
			}
			.mode-btn[data-mode='object_incorrect'] .dot {
				background: var(--obj-incorrect);
			}

			.mode-btn:hover {
				color: var(--text);
				border-color: var(--border-light);
			}

			.mode-btn.active[data-mode='relational_correct'] {
				background: var(--rel-correct-bg);
				border-color: var(--rel-correct);
				color: var(--text-bright);
			}
			.mode-btn.active[data-mode='relational_incorrect'] {
				background: var(--rel-incorrect-bg);
				border-color: var(--rel-incorrect);
				color: var(--text-bright);
			}
			.mode-btn.active[data-mode='object_correct'] {
				background: var(--obj-correct-bg);
				border-color: var(--obj-correct);
				color: var(--text-bright);
			}
			.mode-btn.active[data-mode='object_incorrect'] {
				background: var(--obj-incorrect-bg);
				border-color: var(--obj-incorrect);
				color: var(--text-bright);
			}

			.mode-btn .kbd {
				font-size: 9px;
				padding: 1px 4px;
				border-radius: 3px;
				background: rgba(255, 255, 255, 0.06);
				color: var(--text-dim);
			}

			/* Responses scroll area */
			#responses {
				flex: 1;
				overflow-y: auto;
				padding: 12px 16px;
				display: flex;
				flex-direction: column;
				gap: 10px;
			}

			#responses::-webkit-scrollbar {
				width: 6px;
			}
			#responses::-webkit-scrollbar-track {
				background: transparent;
			}
			#responses::-webkit-scrollbar-thumb {
				background: var(--border);
				border-radius: 3px;
			}

			/* Response card */
			.response-card {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: var(--radius);
				overflow: hidden;
				transition: border-color var(--transition);
			}

			.response-card:hover {
				border-color: var(--border-light);
			}

			.card-header {
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 6px 12px;
				background: var(--surface2);
				border-bottom: 1px solid var(--border);
			}

			.card-pid {
				font-family: var(--font-mono);
				font-size: 10px;
				color: var(--text-dim);
				letter-spacing: 0.05em;
			}

			/* Count badges */
			.count-badges {
				display: flex;
				gap: 5px;
			}

			.badge {
				display: flex;
				align-items: center;
				gap: 3px;
				font-family: var(--font-mono);
				font-size: 10px;
				padding: 2px 6px;
				border-radius: 3px;
				background: var(--surface);
				border: 1px solid var(--border);
				color: var(--text-dim);
				transition: all var(--transition);
				white-space: nowrap;
			}

			.badge.has-value {
				color: var(--text);
				border-color: var(--border-light);
			}

			.badge[data-cat='relational_correct'] .badge-dot {
				background: var(--rel-correct);
			}
			.badge[data-cat='relational_incorrect'] .badge-dot {
				background: var(--rel-incorrect);
			}
			.badge[data-cat='object_correct'] .badge-dot {
				background: var(--obj-correct);
			}
			.badge[data-cat='object_incorrect'] .badge-dot {
				background: var(--obj-incorrect);
			}

			.badge-dot {
				width: 6px;
				height: 6px;
				border-radius: 50%;
				flex-shrink: 0;
				opacity: 0.7;
			}

			/* Response text */
			.response-text {
				padding: 10px 12px;
				font-family: var(--font-sans);
				font-size: 13px;
				line-height: 1.7;
				color: var(--text);
				cursor: text;
				user-select: text;
				word-break: break-word;
			}

			/* active-mode cursor hint */
			body.mode-active .response-text {
				cursor: crosshair;
			}

			/* Highlights */
			.hl {
				position: relative;
				border-radius: 3px;
				padding: 1px 2px;
				cursor: pointer;
				transition: filter var(--transition);
			}

			.hl:hover {
				filter: brightness(1.3);
			}

			.hl[data-cat='relational_correct'] {
				background: var(--rel-correct-bg);
				border-bottom: 2px solid var(--rel-correct);
				color: var(--text-bright);
			}
			.hl[data-cat='relational_incorrect'] {
				background: var(--rel-incorrect-bg);
				border-bottom: 2px solid var(--rel-incorrect);
				color: var(--text-bright);
			}
			.hl[data-cat='object_correct'] {
				background: var(--obj-correct-bg);
				border-bottom: 2px solid var(--obj-correct);
				color: var(--text-bright);
			}
			.hl[data-cat='object_incorrect'] {
				background: var(--obj-incorrect-bg);
				border-bottom: 2px solid var(--obj-incorrect);
				color: var(--text-bright);
			}

			/* Remove button that appears on highlight hover */
			.hl-remove {
				display: none;
				position: absolute;
				top: -8px;
				right: -6px;
				width: 16px;
				height: 16px;
				border-radius: 50%;
				background: #ef4444;
				color: #fff;
				font-size: 9px;
				font-weight: 700;
				align-items: center;
				justify-content: center;
				cursor: pointer;
				z-index: 10;
				line-height: 1;
				border: none;
			}

			.hl:hover .hl-remove {
				display: flex;
			}

			/* Footer bar */
			#footer {
				padding: 10px 16px;
				background: var(--surface);
				border-top: 1px solid var(--border);
				display: flex;
				align-items: center;
				justify-content: space-between;
				flex-shrink: 0;
			}

			#hint {
				font-family: var(--font-mono);
				font-size: 10px;
				color: var(--text-dim);
			}

			#btn-save {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 7px 18px;
				background: #3b82f6;
				color: #fff;
				border: none;
				border-radius: var(--radius);
				font-family: var(--font-mono);
				font-size: 12px;
				font-weight: 600;
				cursor: pointer;
				letter-spacing: 0.05em;
				transition: background var(--transition);
			}

			#btn-save:hover {
				background: #2563eb;
			}
			#btn-save:active {
				background: #1d4ed8;
			}
			#btn-save .kbd {
				font-size: 9px;
				padding: 1px 5px;
				background: rgba(255, 255, 255, 0.15);
				border-radius: 3px;
			}

			/* Empty / done states */
			#empty-state,
			#done-state {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				height: 100%;
				gap: 12px;
				color: var(--text-dim);
				font-family: var(--font-mono);
				font-size: 13px;
				text-align: center;
			}

			#done-state .big {
				font-size: 32px;
				margin-bottom: 8px;
			}

			/* Tooltip for mode shortcut */
			#active-mode-indicator {
				font-family: var(--font-mono);
				font-size: 10px;
				color: var(--text-dim);
				padding: 3px 8px;
				background: var(--surface2);
				border-radius: var(--radius);
				border: 1px solid var(--border);
				margin-left: auto;
				margin-right: 0;
				display: none;
			}

			#active-mode-indicator.visible {
				display: inline-block;
			}
		</style>
	</head>
	<body>
		<div id="app">
			<!-- Header -->
			<div id="header">
				<span class="title">Memory Scoring</span>
				<span id="stim-label">—</span>
				<span id="progress">Loading…</span>
			</div>

			<!-- Main -->
			<div id="main">
				<!-- Left: image -->
				<div id="left-panel">
					<div id="img-wrap">
						<img id="stim-img" src="" alt="Stimulus image" draggable="false" />
					</div>
				</div>

				<!-- Right: mode + responses -->
				<div id="right-panel">
					<!-- Mode buttons -->
					<div id="mode-bar">
						<span class="mode-label">Mode</span>
						<button class="mode-btn" data-mode="relational_correct" tabindex="0">
							<span class="dot"></span> Correct relation <span class="kbd">1</span>
						</button>
						<button class="mode-btn" data-mode="relational_incorrect" tabindex="0">
							<span class="dot"></span> Incorrect relation <span class="kbd">2</span>
						</button>
						<button class="mode-btn" data-mode="object_correct" tabindex="0">
							<span class="dot"></span> Correct object <span class="kbd">3</span>
						</button>
						<button class="mode-btn" data-mode="object_incorrect" tabindex="0">
							<span class="dot"></span> Incorrect object <span class="kbd">4</span>
						</button>
						<span id="active-mode-indicator">— no mode —</span>
					</div>

					<!-- Response cards -->
					<div id="responses"></div>

					<!-- Footer -->
					<div id="footer">
						<span id="hint"
							>Select text while a mode is active to annotate. <b>Esc</b> deactivates
							mode.</span
						>
						<button id="btn-save">Save &amp; Next <span class="kbd">↵</span></button>
					</div>
				</div>
			</div>
		</div>

		<script>
			// ─────────────────────────────────────────────────────────────────────────────
			// State
			// ─────────────────────────────────────────────────────────────────────────────
			let queue = []; // full queue from /api/queue
			let queuePos = 0; // current index into queue
			let activeMode = null; // one of the 4 category strings, or null

			// Per-response annotation state:
			// { [subjectId]: { spans: [{id, category, char_start, char_end, text}] } }
			let annotations = {};

			// ─────────────────────────────────────────────────────────────────────────────
			// Boot
			// ─────────────────────────────────────────────────────────────────────────────
			async function boot() {
				const res = await fetch('/api/queue');
				const data = await res.json();
				queue = data.items || [];
				queuePos = 0;
				if (queue.length === 0) {
					showDone();
				} else {
					loadImage(queuePos);
				}
				updateProgress();
			}

			// ─────────────────────────────────────────────────────────────────────────────
			// Navigation
			// ─────────────────────────────────────────────────────────────────────────────
			function loadImage(idx) {
				if (idx >= queue.length) {
					showDone();
					return;
				}

				const item = queue[idx];
				annotations = {};

				// Image
				const img = document.getElementById('stim-img');
				img.src = `/api/image/${item.stim_id}`;
				img.alt = item.stim_id;

				document.getElementById('stim-label').textContent = `StimID: ${item.stim_id}`;

				// Build annotation state
				item.responses.forEach(r => {
					annotations[r.subject_id] = { spans: [] };
				});

				renderResponses(item);
				updateProgress();
				setMode(null); // deactivate mode on image change
			}

			function updateProgress() {
				const remaining = queue.length - queuePos;
				document.getElementById('progress').textContent =
					`Image ${queuePos + 1} / ${queue.length}  (${remaining} remaining)`;
			}

			// ─────────────────────────────────────────────────────────────────────────────
			// Mode
			// ─────────────────────────────────────────────────────────────────────────────
			function setMode(mode) {
				activeMode = mode;

				document.querySelectorAll('.mode-btn').forEach(btn => {
					btn.classList.toggle('active', btn.dataset.mode === mode);
				});

				const ind = document.getElementById('active-mode-indicator');
				if (mode) {
					const labels = {
						relational_correct: 'Correct relation',
						relational_incorrect: 'Incorrect relation',
						object_correct: 'Correct object',
						object_incorrect: 'Incorrect object',
					};
					ind.textContent = `● ${labels[mode]}`;
					ind.className = 'visible';
					document.body.classList.add('mode-active');
				} else {
					ind.textContent = '— no mode —';
					ind.className = '';
					document.body.classList.remove('mode-active');
				}
			}

			document.querySelectorAll('.mode-btn').forEach(btn => {
				btn.addEventListener('click', () => {
					const m = btn.dataset.mode;
					setMode(activeMode === m ? null : m);
				});
			});

			// ─────────────────────────────────────────────────────────────────────────────
			// Render responses
			// ─────────────────────────────────────────────────────────────────────────────
			function renderResponses(item) {
				const container = document.getElementById('responses');
				container.innerHTML = '';

				item.responses.forEach(r => {
					const card = document.createElement('div');
					card.className = 'response-card';
					card.dataset.subjectId = r.subject_id;

					// Header
					const header = document.createElement('div');
					header.className = 'card-header';

					const pid = document.createElement('span');
					pid.className = 'card-pid';
					pid.textContent = r.subject_id.replace('Encode-Decode_Experiment-', 'P');

					const badges = document.createElement('div');
					badges.className = 'count-badges';

					const catDefs = [
						{ cat: 'relational_correct', label: 'R✓' },
						{ cat: 'relational_incorrect', label: 'R✗' },
						{ cat: 'object_correct', label: 'O✓' },
						{ cat: 'object_incorrect', label: 'O✗' },
					];
					catDefs.forEach(({ cat, label }) => {
						const b = document.createElement('span');
						b.className = 'badge';
						b.dataset.cat = cat;
						b.dataset.subjectId = r.subject_id;
						b.innerHTML = `<span class="badge-dot"></span>${label} <span class="badge-count">0</span>`;
						badges.appendChild(b);
					});

					header.appendChild(pid);
					header.appendChild(badges);

					// Text
					const textDiv = document.createElement('div');
					textDiv.className = 'response-text';
					textDiv.dataset.subjectId = r.subject_id;
					textDiv.dataset.rawText = r.free_response;

					card.appendChild(header);
					card.appendChild(textDiv);
					container.appendChild(card);

					// Render text with any existing highlights
					renderText(r.subject_id, r.free_response);
					updateBadges(r.subject_id);

					// Mouseup handler for text selection
					textDiv.addEventListener('mouseup', e => {
						if (!activeMode) return;
						handleSelection(r.subject_id, r.free_response, textDiv);
					});
				});
			}

			// ─────────────────────────────────────────────────────────────────────────────
			// Text rendering with highlights
			// ─────────────────────────────────────────────────────────────────────────────
			function renderText(subjectId, rawText) {
				const textDiv = document.querySelector(
					`.response-text[data-subject-id="${subjectId}"]`
				);
				if (!textDiv) return;

				const spans = annotations[subjectId]?.spans || [];
				// Sort spans by start position
				const sorted = [...spans].sort((a, b) => a.char_start - b.char_start);

				// Build HTML by inserting mark elements at span boundaries
				let html = '';
				let cursor = 0;

				sorted.forEach(span => {
					if (span.char_start < cursor) return; // overlapping — skip
					// Plain text before this span
					html += escapeHtml(rawText.slice(cursor, span.char_start));
					// Highlighted span
					html +=
						`<span class="hl" data-cat="${span.category}" data-span-id="${span.id}">` +
						escapeHtml(rawText.slice(span.char_start, span.char_end)) +
						`<button class="hl-remove" title="Remove annotation">×</button>` +
						`</span>`;
					cursor = span.char_end;
				});

				// Remaining text
				html += escapeHtml(rawText.slice(cursor));
				textDiv.innerHTML = html;

				// Attach remove listeners
				textDiv.querySelectorAll('.hl-remove').forEach(btn => {
					btn.addEventListener('mousedown', e => {
						e.preventDefault();
						e.stopPropagation();
					});
					btn.addEventListener('click', e => {
						e.preventDefault();
						e.stopPropagation();
						const spanId = btn.closest('.hl').dataset.spanId;
						removeSpan(subjectId, spanId, rawText);
					});
				});
			}

			function escapeHtml(str) {
				return str
					.replace(/&/g, '&amp;')
					.replace(/</g, '&lt;')
					.replace(/>/g, '&gt;')
					.replace(/"/g, '&quot;');
			}

			// ─────────────────────────────────────────────────────────────────────────────
			// Selection → span
			// ─────────────────────────────────────────────────────────────────────────────
			function handleSelection(subjectId, rawText, textDiv) {
				const sel = window.getSelection();
				if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;

				const range = sel.getRangeAt(0);

				// Make sure selection is within this textDiv
				if (!textDiv.contains(range.commonAncestorContainer)) return;

				// Compute char offsets in the raw text by using a TreeWalker
				// that only walks text nodes within textDiv
				const charStart = getCharOffset(textDiv, range.startContainer, range.startOffset);
				const charEnd = getCharOffset(textDiv, range.endContainer, range.endOffset);

				if (charStart === null || charEnd === null || charStart >= charEnd) return;

				// Check for overlap with existing spans
				const existing = annotations[subjectId]?.spans || [];
				const overlaps = existing.some(
					s => charStart < s.char_end && charEnd > s.char_start
				);
				if (overlaps) {
					sel.removeAllRanges();
					return;
				}

				// Create new span
				const spanObj = {
					id: `span_${Date.now()}_${Math.random().toString(36).slice(2, 7)}`,
					category: activeMode,
					char_start: charStart,
					char_end: charEnd,
					text: rawText.slice(charStart, charEnd),
				};

				annotations[subjectId].spans.push(spanObj);
				sel.removeAllRanges();

				renderText(subjectId, rawText);
				updateBadges(subjectId);
			}

			function getCharOffset(container, node, nodeOffset) {
				// Walk all text nodes in container and accumulate their lengths
				// until we reach the target node, then add nodeOffset.
				// Returns null if node not found.
				const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
				let offset = 0;

				while (walker.nextNode()) {
					const current = walker.currentNode;
					if (current === node) {
						return offset + nodeOffset;
					}
					offset += current.textContent.length;
				}
				return null;
			}

			// ─────────────────────────────────────────────────────────────────────────────
			// Remove span
			// ─────────────────────────────────────────────────────────────────────────────
			function removeSpan(subjectId, spanId, rawText) {
				if (!annotations[subjectId]) return;
				annotations[subjectId].spans = annotations[subjectId].spans.filter(
					s => s.id !== spanId
				);
				renderText(subjectId, rawText);
				updateBadges(subjectId);
			}

			// ─────────────────────────────────────────────────────────────────────────────
			// Badge counts
			// ─────────────────────────────────────────────────────────────────────────────
			function updateBadges(subjectId) {
				const spans = annotations[subjectId]?.spans || [];
				const counts = {
					relational_correct: 0,
					relational_incorrect: 0,
					object_correct: 0,
					object_incorrect: 0,
				};
				spans.forEach(s => {
					if (s.category in counts) counts[s.category]++;
				});

				document
					.querySelectorAll(`.badge[data-subject-id="${subjectId}"]`)
					.forEach(badge => {
						const cat = badge.dataset.cat;
						const count = counts[cat];
						badge.querySelector('.badge-count').textContent = count;
						badge.classList.toggle('has-value', count > 0);
					});
			}

			// ─────────────────────────────────────────────────────────────────────────────
			// Save & Next
			// ─────────────────────────────────────────────────────────────────────────────
			async function saveAndNext() {
				const item = queue[queuePos];
				if (!item) return;

				const responsePayload = item.responses.map(r => {
					const spans = annotations[r.subject_id]?.spans || [];
					const counts = {
						relational_correct: 0,
						relational_incorrect: 0,
						object_correct: 0,
						object_incorrect: 0,
					};
					spans.forEach(s => {
						if (s.category in counts) counts[s.category]++;
					});

					return {
						subject_id: r.subject_id,
						n_relational_correct: counts.relational_correct,
						n_relational_incorrect: counts.relational_incorrect,
						n_objects_correct: counts.object_correct,
						n_objects_incorrect: counts.object_incorrect,
						spans: spans.map(s => ({
							category: s.category,
							char_start: s.char_start,
							char_end: s.char_end,
							text: s.text,
						})),
					};
				});

				const payload = { stim_id: item.stim_id, responses: responsePayload };

				const btn = document.getElementById('btn-save');
				btn.textContent = 'Saving…';
				btn.disabled = true;

				try {
					const res = await fetch('/api/save', {
						method: 'POST',
						headers: { 'Content-Type': 'application/json' },
						body: JSON.stringify(payload),
					});
					const data = await res.json();

					if (data.ok) {
						queuePos++;
						if (queuePos >= queue.length) {
							showDone();
						} else {
							loadImage(queuePos);
						}
					} else {
						alert('Save failed: ' + (data.error || 'unknown error'));
					}
				} catch (err) {
					alert('Network error: ' + err.message);
				} finally {
					btn.innerHTML = 'Save &amp; Next <span class="kbd">↵</span>';
					btn.disabled = false;
				}
			}

			document.getElementById('btn-save').addEventListener('click', saveAndNext);

			// ─────────────────────────────────────────────────────────────────────────────
			// Done state
			// ─────────────────────────────────────────────────────────────────────────────
			function showDone() {
				document.getElementById('main').innerHTML = `
    <div id="done-state" style="grid-column: 1/-1">
      <div class="big">✓</div>
      <div style="color: var(--text); font-size: 16px; font-weight: 600;">All images scored</div>
      <div style="color: var(--text-dim); font-size: 12px;">memory_scores.csv and memory_annotations.json updated.</div>
    </div>`;
				document.getElementById('progress').textContent = 'Complete';
				document.getElementById('stim-label').textContent = '';
			}

			// ─────────────────────────────────────────────────────────────────────────────
			// Keyboard shortcuts
			// ─────────────────────────────────────────────────────────────────────────────
			document.addEventListener('keydown', e => {
				// Don't fire if typing in an input
				if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

				const modeMap = {
					1: 'relational_correct',
					2: 'relational_incorrect',
					3: 'object_correct',
					4: 'object_incorrect',
				};
				if (modeMap[e.key]) {
					const m = modeMap[e.key];
					setMode(activeMode === m ? null : m);
					e.preventDefault();
				}
				if (e.key === 'Escape') {
					setMode(null);
				}
				if (e.key === 'Enter' && !e.shiftKey) {
					saveAndNext();
					e.preventDefault();
				}
			});

			// ─────────────────────────────────────────────────────────────────────────────
			// Init
			// ─────────────────────────────────────────────────────────────────────────────
			boot();
		</script>
	</body>
</html>
